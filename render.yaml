services:
  - type: keyvalue
    name: suprefax-redis
    plan: free
    ipAllowList: []

  - type: web
    name: suprefax-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run migrate
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: suprefax-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://suprefax.com,https://www.suprefax.com,https://suprefax.netlify.app
      - key: MONO_SEC_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
